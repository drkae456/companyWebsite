services:
  db:
    container_name: postgres_db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: companywebsite_db
      POSTGRES_USER: companywebsite_user
      POSTGRES_PASSWORD: companywebsite_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web_network
    ports:
      - "5432:5432"

  web:
    container_name: django_app
    build: .
    restart: always
    volumes:
      - .:/app  # Mount project code for hot reloading
      - staticfiles:/app/static
      - mediafiles:/app/media
      # Keep custom_static mount if you have static files there
      - ./custom_static:/app/custom_static 
    networks:
      - web_network
    environment:
      - DEBUG=1  # Enable debug mode for development
      - DB_ENGINE=postgresql
      - DB_HOST=db
      - DB_NAME=companywebsite_db
      - DB_USERNAME=companywebsite_user
      - DB_PASS=companywebsite_pass
      - DB_PORT=5432
    ports:
      - "8000:8000"  # Expose port for development server
    depends_on:
      - db
    # Use Django development server for hot reloading
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate && 
             python manage.py collectstatic --noinput --clear &&
             python manage.py runserver 0.0.0.0:8000"
    develop:
      watch:
        - action: restart
          path: .
          ignore:
            - static/
            - media/
            - __pycache__/
            - "*.pyc"
            - .git/
            - .gitignore
            - README.md
            - requirements.txt

  nginx:
    container_name: nginx
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      # Use named volumes (read-only)
      - staticfiles:/app/static:ro
      - mediafiles:/app/media:ro
      # Nginx config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web_network
    depends_on:
      - web

networks:
  web_network:
    driver: bridge

# Define named volumes
volumes:
  staticfiles: {}
  mediafiles: {}
  postgres_data: {}
 